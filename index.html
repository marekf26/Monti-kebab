<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="description" content="Kebab Monti v Bezně. Přijďte ochutnat nejlepší kebab v okolí. Podívejte se na naše menu a objednejte si ještě dnes.">
    <meta name="keywords" content="Kebab bezno, kebab monti, nejlepší kebab, rychlé občerstvení Bezno, doner, durum">
    <meta name="author" content="Monti Kebab">
    <title>Kebab Monti | Bezno</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container nav-content">
            <div class="logo">
                <a href="#">Kebab Monti</a>
            </div>
            <div class="nav-links">
                <a href="#o-nas">O nás</a>
                <a href="#menu">Menu</a>
                <a href="#objednat">Objednat</a>
            </div>
        </div>
    </nav>

    <header id="o-nas" class="hero">
        <img src="https://images.unsplash.com/photo-1561651823-34feb02250e4?auto=format&fit=crop&w=1920&q=80" 
             alt="Čerstvý Kebab Monti Bezno - Hero obrázek" 
             class="hero-bg">
        
        <div class="hero-overlay"></div>
        
        <div class="hero-content">
            <h1>Vítejte na našich stránkách</h1>
            <div class="hero-buttons">
                <a href="#menu" class="btn btn-outline">Menu</a>
                <a href="#objednat" class="btn btn-primary">Objednat</a>
            </div>
        </div>
    </header>

    <section id="menu" class="menu-section">
        <div class="container text-center">
            <h2 class="section-title">Menu</h2>
            <div class="divider"></div>
            
            <div class="menu-card">
                <img src="images/kebab.png"  alt="" 
                     title="Menu Kebab Monti Bezno"
                     class="menu-img">
            </div>
        </div>
    </section>

    <section id="objednat" class="order-section">
        <div class="container text-center">
            <h2>Objednejte si</h2>
            
            <a href="tel:+420123456678" class="phone-number">
                +420 123 456 678
            </a>
            
            <p class="order-text">Zavolejte nám a my vám jídlo obratem připravíme.</p>
        </div>
    </section>

    <footer class="footer">
        <div class="container footer-content">
            <div class="footer-left">
                <p class="footer-heading">Kontakt</p>
                <a href="mailto:Email@example.com" class="footer-link">Email@example.com</a>
                <a href="tel:+420123456678" class="footer-phone">+420 123 456 678</a>
            </div>

            <div class="footer-right">
                <p class="footer-logo">Monti Kebab</p>
                <p class="copyright">
                    &copy; 2026 Kebab Monti Bezno. Všechna práva vyhrazena.
                </p>
            </div>
        </div>
    </footer>

</body>
</html>
